<mat-card class="gauge-card">
  <mat-card-header>
    <mat-card-title>Current Air Quality</mat-card-title>
    <span
      class="accuracy-chip"
      [style.background-color]="accuracyColor"
      >{{ accuracyLabel }}</span
    >
  </mat-card-header>
  <mat-card-content>
    <div class="gauge-status">{{ iaqLabel }}</div>
    <div #gaugeDiv class="gauge-chart"></div>
    <div class="last-updated" *ngIf="lastUpdated">
      Updated {{ lastUpdated | date: 'short' }}
    </div>
  </mat-card-content>
</mat-card>
